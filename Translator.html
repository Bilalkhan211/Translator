<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Translator PRO</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Segoe UI';
    background: #050a12;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
}

/* ===== ANIMATED BACKGROUND ===== */
#bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
}

/* Aurora / nebula blobs */
.aurora {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    animation: float-aurora 12s ease-in-out infinite alternate;
    z-index: 0;
    pointer-events: none;
}
.aurora-1 {
    width: 500px; height: 400px;
    background: radial-gradient(ellipse, #00ffc8, transparent 70%);
    top: -100px; left: -100px;
    animation-duration: 14s;
}
.aurora-2 {
    width: 600px; height: 500px;
    background: radial-gradient(ellipse, #7c3aed, transparent 70%);
    bottom: -150px; right: -150px;
    animation-duration: 18s;
    animation-delay: -6s;
}
.aurora-3 {
    width: 400px; height: 350px;
    background: radial-gradient(ellipse, #f59e0b, transparent 70%);
    top: 40%; left: 30%;
    animation-duration: 20s;
    animation-delay: -10s;
    opacity: 0.10;
}
.aurora-4 {
    width: 350px; height: 300px;
    background: radial-gradient(ellipse, #06b6d4, transparent 70%);
    top: 10%; right: 20%;
    animation-duration: 16s;
    animation-delay: -4s;
    opacity: 0.13;
}

@keyframes float-aurora {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(40px, -30px) scale(1.08); }
    66%  { transform: translate(-25px, 20px) scale(0.95); }
    100% { transform: translate(30px, 40px) scale(1.05); }
}

/* Grid lines */
.grid-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
    background-image:
        linear-gradient(rgba(0,255,180,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,180,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: grid-move 20s linear infinite;
}
@keyframes grid-move {
    0%   { background-position: 0 0; }
    100% { background-position: 60px 60px; }
}

/* Container */
.container {
    position: relative;
    z-index: 10;
    width: 440px;
    font-family: 'Times New Roman', Times, serif;
    padding: 28px 24px;
    border-radius: 24px;
    background: rgba(10, 20, 35, 0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(0, 255, 180, 0.15);
    box-shadow:
        0 0 0 1px rgba(0,255,180,0.08),
        0 0 40px rgba(0,200,140,0.15),
        0 20px 60px rgba(0,0,0,0.6);
    animation: container-in 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
}

@keyframes container-in {
    from { opacity: 0; transform: translateY(30px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}

h2 {
    text-align: center;
    font-family: 'Times New Roman', Times, serif;
    font-size: 26px;
    letter-spacing: 0.5px;
    background: linear-gradient(135deg, #00ffc8, #7c3aed, #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
    animation: title-glow 4s ease-in-out infinite alternate;
}

@keyframes title-glow {
    from { filter: drop-shadow(0 0 6px rgba(0,255,200,0.4)); }
    to   { filter: drop-shadow(0 0 14px rgba(124,58,237,0.5)); }
}

textarea {
    width: 100%;
    height: 85px;
    border-radius: 14px;
    padding: 12px 14px;
    border: 1px solid rgba(0,255,180,0.2);
    margin-bottom: 10px;
    outline: none;
    background: rgba(255,255,255,0.06);
    color: white;
    font-family: 'Times New Roman', Times, serif;
    font-size: 15px;
    resize: none;
    transition: border-color 0.3s;
}
textarea:focus {
    border-color: rgba(0,255,180,0.5);
    background: rgba(255,255,255,0.09);
}
textarea::placeholder { color: rgba(255,255,255,0.35); }

button {
    width: 100%;
    padding: 10px;
    border-radius: 14px;
    border: none;
    margin-top: 8px;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
    letter-spacing: 0.3px;
}
button:hover {
    transform: scale(1.03) translateY(-1px);
    filter: brightness(1.15);
}
button:active { transform: scale(0.98); }

.translate {
    background: linear-gradient(135deg, #b45309, #d97706);
    color: white;
    box-shadow: 0 4px 20px rgba(217,119,6,0.35);
}
.mic {
    background: linear-gradient(135deg, #065f46, #059669);
    color: white;
    box-shadow: 0 4px 20px rgba(5,150,105,0.35);
}
.dark {
    background: rgba(255,255,255,0.08);
    color: white;
    border: 1px solid rgba(255,255,255,0.15);
}
.speaker {
    background: linear-gradient(135deg, #1e3a5f, #2563eb);
    color: white;
    box-shadow: 0 4px 20px rgba(37,99,235,0.35);
    font-size: 14px;
}
.speaker:disabled {
    background: rgba(30,58,95,0.4);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
    filter: none;
}

.result {
    margin-top: 12px;
    padding: 12px 14px;
    background: rgba(0,255,180,0.05);
    border: 1px solid rgba(0,255,180,0.15);
    border-radius: 14px;
    min-height: 44px;
    font-family: 'Times New Roman', Times, serif;
    font-size: 19px;
    color: #d1fae5;
    animation: pulse-border 3s ease-in-out infinite alternate;
}

.resul {
    margin-top: 14px;
    padding: 12px 14px;
    background: rgba(124,58,237,0.07);
    border: 1px solid rgba(124,58,237,0.2);
    border-radius: 14px;
    min-height: 44px;
    animation: pulse-border2 4s ease-in-out infinite alternate;
    font-size: 14px;
    color: rgba(255,255,255,0.8);
}

@keyframes pulse-border {
    from { box-shadow: 0 0 6px rgba(0,255,180,0.1); }
    to   { box-shadow: 0 0 18px rgba(0,255,180,0.25); }
}
@keyframes pulse-border2 {
    from { box-shadow: 0 0 6px rgba(124,58,237,0.1); }
    to   { box-shadow: 0 0 18px rgba(124,58,237,0.25); }
}

.badge {
    background: rgba(0,212,255,0.15);
    color: #67e8f9;
    padding: 3px 10px;
    border-radius: 8px;
    margin-left: 4px;
    font-size: 13px;
    border: 1px solid rgba(0,212,255,0.25);
}

h3 {
    color: rgba(255,255,255,0.35);
    text-align: end;
    margin-bottom: 0;
    margin-top: 18px;
    font-size: 12px;
    font-family: sans-serif;
    font-weight: normal;
    letter-spacing: 0.5px;
}

/* Shooting stars */
.shooting-star {
    position: fixed;
    width: 2px;
    height: 2px;
    border-radius: 50%;
    background: white;
    z-index: 1;
    pointer-events: none;
}
.shooting-star::after {
    content: '';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    right: 2px;
    width: 80px;
    height: 1px;
    background: linear-gradient(to left, rgba(255,255,255,0.6), transparent);
}
</style>
</head>
<body>

<!-- Aurora blobs -->
<div class="aurora aurora-1"></div>
<div class="aurora aurora-2"></div>
<div class="aurora aurora-3"></div>
<div class="aurora aurora-4"></div>

<!-- Scrolling grid -->
<div class="grid-overlay"></div>

<!-- Particle canvas -->
<canvas id="bg-canvas"></canvas>

<div class="container">
    <h2>English → Urdu Translator</h2>

    <textarea id="inputText" placeholder="Type or Speak English here..."></textarea>

    <button class="mic" onclick="startVoice()">🎤 Speak</button>
    <button class="translate" onclick="translateText()">⚡ Translate</button>
    <button class="dark" onclick="toggleDark()">🌙 Toggle Mode</button>

    <div class="result" id="translation">Translation</div>

    <button class="speaker" id="speakBtn" onclick="speakTranslation()">🔊 Listen Translation</button>

    <div class="resul" id="related">Related words</div>
    <h3>Made by Arif Khan</h3>
</div>

<script>
// ===== PARTICLE SYSTEM =====
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const COLORS = ['#00ffc8','#7c3aed','#06b6d4','#f59e0b','#ffffff','#a78bfa'];

const stars = Array.from({length: 120}, () => ({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 1.5 + 0.3,
    alpha: Math.random(),
    speed: Math.random() * 0.004 + 0.002,
    phase: Math.random() * Math.PI * 2,
    color: COLORS[Math.floor(Math.random() * COLORS.length)]
}));

const orbs = Array.from({length: 18}, () => ({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 2.5 + 1,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * 0.4,
    alpha: Math.random() * 0.7 + 0.3,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    pulse: Math.random() * Math.PI * 2,
    pulseSpeed: Math.random() * 0.03 + 0.01
}));

// Shooting star state
let shootingStars = [];
function spawnShootingStar() {
    shootingStars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height * 0.5,
        len: Math.random() * 120 + 60,
        speed: Math.random() * 6 + 4,
        angle: Math.PI / 5 + (Math.random() - 0.5) * 0.4,
        alpha: 1,
        life: 0
    });
}
setInterval(spawnShootingStar, 3000 + Math.random() * 2000);

let t = 0;
function drawFrame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    t += 0.01;

    // Draw twinkling stars
    stars.forEach(s => {
        s.phase += s.speed;
        const a = (Math.sin(s.phase) * 0.5 + 0.5) * 0.8 + 0.1;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = s.color + Math.floor(a * 255).toString(16).padStart(2,'0');
        ctx.fill();
    });

    // Draw glowing orbs
    orbs.forEach(o => {
        o.x += o.vx;
        o.y += o.vy;
        o.pulse += o.pulseSpeed;
        if (o.x < 0) o.x = canvas.width;
        if (o.x > canvas.width) o.x = 0;
        if (o.y < 0) o.y = canvas.height;
        if (o.y > canvas.height) o.y = 0;
        const pulsedR = o.r * (1 + Math.sin(o.pulse) * 0.4);
        const grd = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, pulsedR * 8);
        grd.addColorStop(0, o.color + 'cc');
        grd.addColorStop(0.4, o.color + '44');
        grd.addColorStop(1, o.color + '00');
        ctx.beginPath();
        ctx.arc(o.x, o.y, pulsedR * 8, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();
    });

    // Shooting stars
    shootingStars = shootingStars.filter(s => s.alpha > 0.02);
    shootingStars.forEach(s => {
        s.x += Math.cos(s.angle) * s.speed;
        s.y += Math.sin(s.angle) * s.speed;
        s.life += s.speed;
        s.alpha = Math.max(0, 1 - s.life / s.len);
        const tailX = s.x - Math.cos(s.angle) * s.len * s.alpha;
        const tailY = s.y - Math.sin(s.angle) * s.len * s.alpha;
        const grd = ctx.createLinearGradient(tailX, tailY, s.x, s.y);
        grd.addColorStop(0, 'rgba(255,255,255,0)');
        grd.addColorStop(1, `rgba(255,255,255,${s.alpha})`);
        ctx.beginPath();
        ctx.moveTo(tailX, tailY);
        ctx.lineTo(s.x, s.y);
        ctx.strokeStyle = grd;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // head dot
        ctx.beginPath();
        ctx.arc(s.x, s.y, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
        ctx.fill();
    });

    requestAnimationFrame(drawFrame);
}
drawFrame();

// ===== TRANSLATOR LOGIC =====
function startVoice() {
    let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US";
    recognition.onresult = function(event) {
        document.getElementById("inputText").value = event.results[0][0].transcript;
        translateText();
    };
    recognition.start();
}

document.getElementById("inputText").addEventListener("input", () => {
    translateText();
});

async function translateText() {
    let text = document.getElementById("inputText").value;
    if (!text) return;
    let res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|ur&de=arifkhankkhan002@gmail.com`);
    let data = await res.json();
    document.getElementById("translation").innerText = data.responseData.translatedText;
    getRelated(text);
}

function speakTranslation() {
    let translatedText = document.getElementById("translation").innerText;
    if (!translatedText || translatedText === "Translation will appear here...") {
        alert("Pehle koi lafz translate karo!");
        return;
    }
    let btn = document.getElementById("speakBtn");
    btn.textContent = "⏳ Load ho raha hai...";
    btn.disabled = true;
    let audioUrl = "https://translate.google.com/translate_tts?ie=UTF-8&tl=ur&client=tw-ob&q=" + encodeURIComponent(translatedText);
    let audio = new Audio(audioUrl);
    audio.oncanplaythrough = function() {
        btn.textContent = "🔊 Bol raha hai...";
        audio.play();
    };
    audio.onended = function() {
        btn.textContent = "🔊 Listen Translation";
        btn.disabled = false;
    };
    audio.onerror = function() {
        btn.textContent = "🔊 Listen Translation";
        btn.disabled = false;
        fallbackSpeak(translatedText);
    };
    audio.load();
}

function fallbackSpeak(text) {
    window.speechSynthesis.cancel();
    let utter = new SpeechSynthesisUtterance(text);
    utter.lang = "ur-PK";
    utter.rate = 0.85;
    let voices = window.speechSynthesis.getVoices();
    let urduVoice = voices.find(v => v.lang.includes("ur")) || voices.find(v => v.lang.includes("ar")) || null;
    if (urduVoice) utter.voice = urduVoice;
    window.speechSynthesis.speak(utter);
}

async function getRelated(word) {
    let res = await fetch(`https://api.datamuse.com/words?ml=${encodeURIComponent(word)}`);
    let data = await res.json();
    let words = data.slice(0, 5).map(w => w.word).join(", ");
    document.getElementById("related").innerHTML = "Related: <span class='badge'>" + words + "</span>";
}

function toggleDark() {
    let body = document.body;
    if (body.style.background === 'rgb(240, 240, 240)') {
        body.style.background = '#050a12';
        body.style.color = 'white';
    } else {
        body.style.background = '#f0f0f0';
        body.style.color = '#111';
    }
}
</script>
</body>
</html>
